<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GChat - Serverless Chat</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#25D366">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</head>
<body>
  <div id="app">
    <header>
      <h1>💬 GChat</h1>
      <div id="status">Connecting...</div>
    </header>
    
    <div id="config-panel" class="modal">
      <h3>Setup GitHub Backend</h3>
      <input id="repo-input" placeholder="yourusername/gchat-messages" value="">
      <input id="token-input" type="password" placeholder="GitHub PAT (repo scope)">
      <button onclick="saveConfig()">Save & Start</button>
    </div>
    
    <div id="chat-container">
      <div id="messages"></div>
      <div id="input-area">
        <input id="message-input" placeholder="Type a message..." maxlength="500">
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
    
    <div id="notification-perms">
      <button onclick="requestNotificationPermission()">Enable Notifications</button>
    </div>
  </div>

  <script src="js/github-api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
